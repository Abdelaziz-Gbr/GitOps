apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nodejs-app
  namespace: argocd

  finalizers:
    - resources-finalizer.argocd.argoproj.io

  annotations:
    argocd-image-updater.argoproj.io/image-list: app=docker.io/abdelazizgbr/nodejs-app

    argocd-image-updater.argoproj.io/write-back-method: git

    argocd-image-updater.argoproj.io/app.kustomize.image-name: abdelazizgbr/nodejs-app

    argocd-image-updater.argoproj.io/app.update-strategy: newest-build

spec:

  project: default

  source:
    repoURL: https://github.com/Abdelaziz-Gbr/GitOps.git
    targetRevision: main
    path: overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true